apiVersion: v1
kind: Service
metadata:
  name: payments
  labels:
    app: payments
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: payments
          image: ghcr.io/ars5njo/quickticket-payments:0723368f82e60d53470985a8c27bd267b636f23a
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PAYMENT_FAILURE_RATE
              value: "0.0"
            - name: PAYMENT_LATENCY_MS
              value: "0"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
