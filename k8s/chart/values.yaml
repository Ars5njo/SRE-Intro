resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

postgres:
  replicas: 1
  image: postgres:17-alpine
  db:
    name: quickticket
    user: quickticket
    password: quickticket
  port: 5432

redis:
  replicas: 1
  image: redis:7-alpine
  port: 6379

gateway:
  replicas: 1
  image: quickticket-gateway:v1
  imagePullPolicy: Never
  port: 8080
  timeoutMs: "5000"
  eventsUrl: http://events:8081
  paymentsUrl: http://payments:8082

events:
  replicas: 1
  image: quickticket-events:v1
  imagePullPolicy: Never
  port: 8081
  db:
    host: postgres
    port: "5432"
    name: quickticket
    user: quickticket
    password: quickticket
    maxConns: "10"
  redis:
    host: redis
    port: "6379"
    timeoutMs: "1000"
  reservationTtl: "300"

payments:
  replicas: 1
  image: quickticket-payments:v1
  imagePullPolicy: Never
  port: 8082
  failureRate: "0.0"
  latencyMs: "0"
