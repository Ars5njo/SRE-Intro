apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image | quote }}
          imagePullPolicy: {{ .Values.gateway.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: EVENTS_URL
              value: {{ .Values.gateway.eventsUrl | quote }}
            - name: PAYMENTS_URL
              value: {{ .Values.gateway.paymentsUrl | quote }}
            - name: GATEWAY_TIMEOUT_MS
              value: {{ .Values.gateway.timeoutMs | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            periodSeconds: 5
            failureThreshold: 2
          resources:
{{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
