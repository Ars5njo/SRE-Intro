apiVersion: v1
kind: Service
metadata:
  name: events
  labels:
    app: events
spec:
  selector:
    app: events
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
  labels:
    app: events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events
  template:
    metadata:
      labels:
        app: events
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: events
          image: ghcr.io/ars5njo/quickticket-events:5fc554f7c251e24c9b368746084338b305b1bd22
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: quickticket
            - name: DB_USER
              value: quickticket
            - name: DB_PASS
              value: quickticket
            - name: DB_MAX_CONNS
              value: "10"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_TIMEOUT_MS
              value: "1000"
            - name: RESERVATION_TTL
              value: "300"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
